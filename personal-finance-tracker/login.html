<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - FinTrack Pro</title>
    <link rel="stylesheet" href="login-register.css">
  </head>
  <body>
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p>Login to FinTrack Pro</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input class="login-username" type="text" id="loginUsername" required="" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="login-password" type="password" id="loginPassword" required="" />
        </div>
        <button class="login-btn" type="submit">Login</button>
      </form>
      <p style="margin-top: 15px; font-size: 14px">Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <script type="module" src="login.js"></script>
  </body>
</html>
